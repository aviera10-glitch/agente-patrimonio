name: Monitorización Diaria Patrimonio

on:
  schedule:
    # Ejecuta a las 07:00 UTC que son las 08:00 AM en Canarias (en horario de invierno) o 09:00 Península
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite que lo ejecutemos manualmente desde la web cuando queramos

# Otorga permisos al bot de GitHub para que pueda guardar el historial de noticias
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          # Para que auto-commit funcione bien necesitamos fetch de todo
          fetch-depth: 0
      
      - name: Preparar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Ejecutar Motor de Búsqueda
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
          
      - name: Guardar la nueva memoria (historial.json)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Bot: Actualizando memoria historial.json"
          file_pattern: 'historial.json'
